<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>LingNow 灵现 - 终极图标微调矩阵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            background-color: #030303;
            color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
        }

        .icon-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            transition: all 0.3s;
        }

        .icon-card:hover {
            border-color: rgba(6, 182, 212, 0.5);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.15);
            transform: translateY(-2px);
        }

        .svg-container svg {
            width: 100%;
            height: 100%;
            transition: transform 0.4s;
        }

        .icon-card:hover .svg-container svg {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12 flex flex-col items-center">

<div class="text-center mb-10 mt-4 max-w-4xl">
    <div class="inline-flex items-center gap-3 px-4 py-2 rounded-full border border-cyan-500/30 bg-cyan-500/10 mb-6">
        <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 100 100">
            <polyline points="20,60 20,20 60,60 60,20" stroke-width="2"/>
            <polyline points="30,70 30,30 70,70 70,30" stroke-width="2"/>
            <polyline points="40,80 40,40 80,80 80,40" stroke-width="2"/>
            <line stroke-width="2" x1="20" x2="40" y1="20" y2="40"/>
            <line stroke-width="2" x1="60" x2="80" y1="20" y2="40"/>
            <line stroke-width="2" x1="20" x2="40" y1="60" y2="80"/>
            <line stroke-width="2" x1="60" x2="80" y1="60" y2="80"/>
        </svg>
        <span class="text-xs font-bold text-cyan-400 tracking-wider">已定稿骨架：并行管线 (Pipeline N)</span>
    </div>
    <h1 class="text-3xl font-black text-white mb-4 tracking-tight">参数调优：风格微感实验室</h1>
    <p class="text-gray-400 text-sm leading-relaxed px-4">
        绝佳的选择！“并行管线”在完美贴合【快速生成与搭积木组件】的同时，具备极强的工业极客美感。<br/>
        既然大方向锁定，我基于这一款骨架，通过调整其<strong>「全维坐标」、「线段粗细 (Weight)」、「转角圆润度 (Join)」、「层级透视
        (Opacity)」、「倾角加速 (Skew)」</strong>等原生 SVG 渲染参数，拉出了 6 种截然不同“视觉情绪”的微调提案。<br/>
        看看哪一种气场最适合现在的团队？
    </p>
</div>

<div class="w-full max-w-5xl" x-data="semanticWireframes()">
    <!-- Toast Notification -->
    <div class="fixed bottom-10 left-1/2 transform -translate-x-1/2 border border-cyan-500/30 bg-cyan-900/90 text-white px-6 py-3 rounded-full shadow-[0_0_15px_rgba(6,182,212,0.3)] z-50 flex items-center gap-2" x-cloak x-show="toastStr"
         x-transition.opacity>
        <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
        </svg>
        <span class="text-sm font-bold" x-text="toastStr"></span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template :key="icon.id" x-for="icon in icons">
            <div class="icon-card flex flex-col p-8 relative group items-center">
                <div class="w-full h-24 flex justify-center items-center svg-container mb-6 text-white">
                    <div class="w-20 h-20 relative drop-shadow-[0_0_8px_rgba(255,255,255,0.1)]" x-html="icon.svg"></div>
                </div>

                <div class="text-base font-bold text-gray-200 mb-2 truncate text-center" x-text="icon.name"></div>
                <div class="text-[12px] text-gray-500 text-center leading-relaxed h-12 px-4" x-text="icon.desc"></div>

                <button class="mt-6 w-full py-2.5 rounded focus:outline-none border border-white/10 hover:border-cyan-500/50 hover:bg-cyan-500/10 text-[11px] uppercase tracking-wider font-bold text-gray-400 hover:text-cyan-400 transition-all"
                        @click="copyToClipboard(icon.svg, icon.name)">
                    确认选用 (提取 SVG 代码)
                </button>
            </div>
        </template>
    </div>
</div>

<script>
    const SvgGen = {
        wrap(content) {
            return `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">${content}</svg>`;
        }
    };

    // The base pipeline coordinates for reuse
    const baseShape = '<polyline points="20,60 20,20 60,60 60,20"/><polyline points="30,70 30,30 70,70 70,30"/><polyline points="40,80 40,40 80,80 80,40"/><line x1="20" y1="20" x2="40" y2="40"/><line x1="60" y1="20" x2="80" y2="40"/><line x1="20" y1="60" x2="40" y2="80"/><line x1="60" y1="60" x2="80" y2="80"/>';

    const wireframes = [
        {
            name: "V1. 完美平衡 (Default)",
            desc: "1:1的基准结构。2px的线条既不过于笨重，也不至于羸弱。锐利、精确、标准原型。",
            svg: `<g stroke-width="2" stroke-linejoin="miter">${baseShape}<circle cx="20" cy="60" r="2" fill="currentColor" stroke="none"/><circle cx="80" cy="40" r="2" fill="currentColor" stroke="none"/></g>`
        },
        {
            name: "V2. 重工稳固 (Bold Industrial)",
            desc: "3.5px 的极致加粗。充满强烈的体量感与基石感，代表生成的代码扎实不可撼动。",
            svg: `<g stroke-width="3.5" stroke-linejoin="miter">${baseShape}</g>`
        },
        {
            name: "V3. 赛博圆融 (Smooth Transition)",
            desc: "加入 Round 算法。直角和折线都变得更加平滑，融合感更强，呈现现代化无缝的硅谷SaaS调性。",
            svg: `<g stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${baseShape}<circle cx="20" cy="60" r="2.5" fill="currentColor" stroke="none"/><circle cx="80" cy="40" r="2.5" fill="currentColor" stroke="none"/></g>`
        },
        {
            name: "V4. 层级透视 (Depth Matrix)",
            desc: "前中后管线加入了不同的 Opacity（透明度），极大地增强了视觉的三维纵深感与架构剖面图的质感。",
            svg: `<g stroke-width="2" stroke-linejoin="miter"><polyline points="20,60 20,20 60,60 60,20" opacity="0.3"/><polyline points="30,70 30,30 70,70 70,30" opacity="0.6"/><polyline points="40,80 40,40 80,80 80,40" opacity="1.0"/><line x1="20" y1="20" x2="40" y2="40" opacity="0.3"/><line x1="60" y1="20" x2="80" y2="40" opacity="0.3"/><line x1="20" y1="60" x2="40" y2="80" opacity="0.6"/><line x1="60" y1="60" x2="80" y2="80" opacity="0.6"/></g>`
        },
        {
            name: "V5. 冲刺极速 (Forward Skew)",
            desc: "在基础系矩阵上加入了 10 度的前倾角。自带视觉加速感，一眼看去便凸显“快速精准高效”。",
            svg: `<g stroke-width="2" stroke-linejoin="miter" transform="translate(10, 0) skewX(-10)">${baseShape}</g>`
        },
        {
            name: "V6. 精芯矩阵 (Node Focused)",
            desc: "全节点星图。管线减弱为 1.5px 并加入虚线段，在所有的汇流处打上科技高亮点，凸显一句话编译逻辑。",
            svg: `<g stroke-width="1.5" stroke-linejoin="miter"><polyline points="30,70 30,30 70,70 70,30" stroke-dasharray="2 3" opacity="0.7"/><polyline points="20,60 20,20 60,60 60,20"/><polyline points="40,80 40,40 80,80 80,40"/><line x1="20" y1="20" x2="40" y2="40" stroke-width="1"/><line x1="60" y1="20" x2="80" y2="40" stroke-width="1"/><line x1="20" y1="60" x2="40" y2="80" stroke-width="1"/><line x1="60" y1="60" x2="80" y2="80" stroke-width="1"/><circle cx="20" cy="20" r="1.5" fill="currentColor" stroke="none"/><circle cx="60" cy="20" r="1.5" fill="currentColor" stroke="none"/><circle cx="20" cy="60" r="1.5" fill="currentColor" stroke="none"/><circle cx="60" cy="60" r="1.5" fill="currentColor" stroke="none"/><circle cx="40" cy="40" r="1.5" fill="currentColor" stroke="none"/><circle cx="80" cy="40" r="1.5" fill="currentColor" stroke="none"/><circle cx="40" cy="80" r="1.5" fill="currentColor" stroke="none"/><circle cx="80" cy="80" r="1.5" fill="currentColor" stroke="none"/></g>`
        }
    ];

    document.addEventListener('alpine:init', () => {
        Alpine.data('semanticWireframes', () => ({
            icons: wireframes.map((wf, idx) => ({id: idx + 1, name: wf.name, desc: wf.desc, svg: SvgGen.wrap(wf.svg)})),
            toastStr: '',
            timeout: null,
            copyToClipboard(svgStr, name) {
                navigator.clipboard.writeText(svgStr).then(() => {
                    this.toastStr = `✅ 已选取 ${name}！代码已入剪贴板。`;
                    if (this.timeout) clearTimeout(this.timeout);
                    this.timeout = setTimeout(() => {
                        this.toastStr = '';
                    }, 2500);
                });
            }
        }));
    });
</script>
</body>
</html>
