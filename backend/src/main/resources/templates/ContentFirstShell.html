<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{{TITLE}} - LingNow Content-First Shell</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
        }

        html, body {
            font-family: "Inter", sans-serif;
        }

        [x-cloak] {
            display: none !important;
        }

        svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        .lingnow-waterfall {
            column-gap: 1.25rem;
        }

        .lingnow-waterfall-card {
            break-inside: avoid;
        }
    </style>
</head>
<body class="antialiased font-sans bg-slate-50 text-slate-900 overflow-x-hidden">
<div @hashchange.window="hash = window.location.hash"
     class="min-h-screen"
     x-data="{
            hash: window.location.hash || '#pg1',
            selectedItem: null,
            drawerOpen: false,
            postOpen: false,
            authOpen: false,
            authMode: 'login',
            notificationsOpen: false,
            profileOpen: false,
            viewer: null,
            authForm: { username: '', password: '' },
            searchQuery: '',
            activeCategory: '',
            activeSignal: 'all',
            mockData: {{MOCK_DATA}},
            normalizeText(value) {
                return String(value ?? '').toLowerCase().replace(/\s+/g, '');
            },
            parseMetric(value) {
                const raw = String(value ?? '').trim().toLowerCase();
                if (!raw) return 0;
                const normalized = raw.replace(/,/g, '').replace(/万/g, 'w');
                if (normalized.endsWith('w')) return (parseFloat(normalized) || 0) * 10000;
                if (normalized.endsWith('k')) return (parseFloat(normalized) || 0) * 1000;
                if (normalized.endsWith('m')) return (parseFloat(normalized) || 0) * 1000000;
                return parseFloat(normalized) || 0;
            },
            feedSource(seedData) {
                return Array.isArray(this.mockData) && this.mockData.length ? this.mockData : seedData;
            },
            itemTags(item) {
                return Array.isArray(item?.tags) ? item.tags : [];
            },
            matchesSearch(item) {
                if (!this.searchQuery) return true;
                const haystack = [
                    item?.title,
                    item?.name,
                    item?.description,
                    item?.summary,
                    item?.content,
                    item?.author,
                    item?.creator,
                    item?.location,
                    item?.topic,
                    item?.category,
                    ...this.itemTags(item)
                ].join(' ');
                return this.normalizeText(haystack).includes(this.normalizeText(this.searchQuery));
            },
            matchesCategory(item) {
                if (!this.activeCategory) return true;
                const categoryText = [
                    item?.category,
                    item?.topic,
                    item?.location,
                    ...this.itemTags(item)
                ].join(' ');
                return this.normalizeText(categoryText).includes(this.normalizeText(this.activeCategory));
            },
            matchesSignal(item) {
                if (this.activeSignal === 'saved') {
                    return this.parseMetric(item?.collects || item?.saves) >= 1200;
                }
                if (this.activeSignal === 'hot') {
                    return this.parseMetric(item?.comments || item?.commentCount) >= 500
                        || this.parseMetric(item?.likes || item?.likeCount) >= 10000;
                }
                if (this.activeSignal === 'media') {
                    const mediaText = [
                        item?.mediaType,
                        item?.contentType,
                        item?.noteType,
                        ...this.itemTags(item)
                    ].join(' ');
                    const normalized = this.normalizeText(mediaText);
                    return normalized.includes('视频') || normalized.includes('video');
                }
                return true;
            },
            sortFeed(items) {
                const cloned = [...items];
                if (this.activeSignal === 'saved') {
                    return cloned.sort((a, b) => this.parseMetric(b?.collects || b?.saves) - this.parseMetric(a?.collects || a?.saves));
                }
                if (this.activeSignal === 'hot') {
                    return cloned.sort((a, b) => {
                        const aScore = this.parseMetric(a?.comments || a?.commentCount) + this.parseMetric(a?.likes || a?.likeCount);
                        const bScore = this.parseMetric(b?.comments || b?.commentCount) + this.parseMetric(b?.likes || b?.likeCount);
                        return bScore - aScore;
                    });
                }
                return cloned;
            },
            getFilteredFeed(seedData) {
                const filtered = this.feedSource(seedData).filter(item => this.matchesSearch(item) && this.matchesCategory(item) && this.matchesSignal(item));
                return this.sortFeed(filtered);
            },
            submitAuth() {
                const username = String(this.authForm?.username ?? '').trim();
                this.viewer = {
                    name: username || 'LingNow 用户',
                    avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(username || 'LingNow')}&background=fef08a&color=111827`
                };
                this.authOpen = false;
                this.authMode = 'login';
                this.profileOpen = false;
                this.authForm = { username: '', password: '' };
            },
            logout() {
                this.viewer = null;
                this.profileOpen = false;
            }
         }">

    <header class="sticky top-0 z-40 w-full border-b border-slate-200 bg-white/85 backdrop-blur-md">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4">
            <div class="flex items-center gap-4">
                <button @click="drawerOpen = !drawerOpen" class="md:hidden p-2 hover:bg-slate-100 rounded-lg">
                    <i class="fa-solid fa-bars"></i>
                </button>
                {{LOGO_AREA}}
            </div>

            <div class="hidden flex-1 max-w-xl mx-8 md:block">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input class="w-full h-11 pl-10 pr-4 rounded-full bg-slate-100 border-transparent focus:bg-white focus:ring-2 focus:ring-rose-200 transition-all text-sm"
                           x-model.debounce.250ms="searchQuery"
                           placeholder="{{SEARCH_PLACEHOLDER}}"
                           type="text">
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button @click="viewer ? postOpen = true : (authMode = 'login', authOpen = true)"
                        class="flex items-center gap-2 rounded-full bg-rose-500 px-4 py-2 text-sm font-bold text-white shadow-lg shadow-rose-200 hover:bg-rose-600 transition">
                    <i class="fa-solid fa-plus"></i>
                    <span>{{PUBLISH_LABEL}}</span>
                </button>
                <div class="flex items-center gap-1 border-l border-slate-200 ml-2 pl-2">
                    <template x-if="!viewer">
                        <div class="ml-2 flex items-center">
                            <button
                                    @click="authMode = 'login'; authOpen = true"
                                    class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50">
                                登录
                            </button>
                        </div>
                    </template>
                    <template x-if="viewer">
                        <div class="relative ml-2">
                            <button @click="profileOpen = !profileOpen" class="rounded-full">
                                <img :src="viewer.avatar"
                                     class="h-8 w-8 rounded-full border border-slate-200 cursor-pointer">
                            </button>
                            <div
                                    @click.outside="profileOpen = false"
                                    class="absolute right-0 top-full mt-2 w-44 bg-white border border-slate-100 shadow-xl rounded-xl"
                                    x-cloak
                                    x-show="profileOpen">
                                <div class="border-b border-slate-100 px-4 py-3">
                                    <div class="text-sm font-semibold text-slate-900" x-text="viewer.name"></div>
                                    <div class="text-xs text-slate-500">已登录</div>
                                </div>
                                <button @click="logout()"
                                        class="flex w-full items-center gap-3 px-4 py-3 text-left text-sm text-slate-600 hover:bg-slate-50">
                                    <i class="fa-solid fa-right-from-bracket"></i>
                                    退出登录
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div class="border-t border-slate-100 bg-white/90">
            <div class="mx-auto flex max-w-7xl items-center gap-3 overflow-x-auto px-4 py-3">
                {{SIDEBAR_NAV}}
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-6">
        {{CONTENT_SLOTS}}
    </main>

    <template x-if="selectedItem">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4" x-cloak>
            <div @click="selectedItem = null" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
            <div class="relative w-full max-w-4xl max-h-[90vh] overflow-y-auto bg-white rounded-3xl shadow-2xl animate-in zoom-in-95 duration-200">
                {{MODAL_SLOT}}
            </div>
        </div>
    </template>

    <template x-if="postOpen">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4" x-cloak>
            <div @click="postOpen = false" class="absolute inset-0 bg-slate-900/40"></div>
            <div class="relative w-full max-w-lg bg-white rounded-2xl p-6 shadow-2xl">
                <h3 class="text-lg font-bold mb-4">{{POST_TITLE}}</h3>
                <textarea class="w-full h-32 p-3 bg-slate-50 border border-slate-200 rounded-xl mb-4"
                          placeholder="{{POST_PLACEHOLDER}}"></textarea>
                <div class="flex gap-2">
                    <button @click="postOpen = false" class="flex-1 py-2 rounded-xl bg-slate-100 font-bold">取消
                    </button>
                    <button @click="postOpen = false" class="flex-1 py-2 rounded-xl bg-rose-500 text-white font-bold">
                        {{POST_SUBMIT_LABEL}}
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="authOpen">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4" x-cloak>
            <div @click="authOpen = false" class="absolute inset-0 bg-slate-900/40"></div>
            <div class="relative w-full max-w-md rounded-[28px] bg-white p-6 shadow-2xl">
                <div class="mb-5 flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-black text-slate-900"
                            x-text="authMode === 'login' ? '欢迎回来' : '创建账号'"></h3>
                        <p class="mt-1 text-sm text-slate-500"
                           x-text="authMode === 'login' ? '登录后继续收藏、评论和发布。' : '注册后即可保存你的兴趣、发布内容和参与互动。'"></p>
                    </div>
                    <button @click="authOpen = false" class="text-2xl leading-none text-slate-300 hover:text-slate-500">
                        &times;
                    </button>
                </div>
                <div class="mb-4 flex rounded-full bg-slate-100 p-1 text-sm font-semibold">
                    <button
                            :class="authMode === 'login' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'"
                            @click="authMode = 'login'"
                            class="flex-1 rounded-full px-4 py-2 transition">
                        登录
                    </button>
                    <button
                            :class="authMode === 'register' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'"
                            @click="authMode = 'register'"
                            class="flex-1 rounded-full px-4 py-2 transition">
                        注册
                    </button>
                </div>
                <div class="space-y-3">
                    <input
                            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-rose-300 focus:bg-white"
                            placeholder="用户名 / 手机号"
                            type="text"
                            x-model="authForm.username">
                    <input
                            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-rose-300 focus:bg-white"
                            placeholder="密码"
                            type="password"
                            x-model="authForm.password">
                    <button
                            @click="submitAuth()"
                            class="w-full rounded-2xl bg-rose-500 px-4 py-3 text-sm font-bold text-white transition hover:bg-rose-600"
                            x-text="authMode === 'login' ? '登录进入' : '注册并进入'"></button>
                </div>
            </div>
        </div>
    </template>
</div>
</body>
</html>
