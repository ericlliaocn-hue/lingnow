<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{{TITLE}} - LingNow Content-First Shell</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
        }

        {
        {
            THEME_CSS
        }
        }

        html, body {
            font-family: "Inter", sans-serif;
        }

        [x-cloak] {
            display: none !important;
        }

        svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        .lingnow-waterfall {
            column-gap: 1.25rem;
        }

        .lingnow-waterfall-card {
            break-inside: avoid;
        }
    </style>
</head>
<body class="antialiased font-sans bg-slate-50 text-slate-900 overflow-x-hidden">
<div @hashchange.window="hash = window.location.hash"
     class="min-h-screen"
     x-data="{
            hash: window.location.hash || '#pg1',
            detailReturnHash: window.location.hash && window.location.hash !== '#detail' ? window.location.hash : '#pg1',
            selectedItem: null,
            detailComments: [],
            draftComment: '',
            replyTarget: '',
            selectedSlot: null,
            selectedLead: null,
            activeOrder: null,
            drawerOpen: false,
            postOpen: false,
            postDraftKind: 'post',
            postTarget: '#pg1',
            authOpen: false,
            authMode: 'login',
            notificationsOpen: false,
            profileOpen: false,
            viewer: null,
            authForm: { username: '', password: '' },
            composerDraft: { title: '', body: '' },
            pagePostDraft: { title: '', body: '', tags: '', scene: '' },
            searchQuery: '',
            activeCategory: '',
            activeSignal: 'all',
            bookingConfirmed: false,
            inquirySubmitted: false,
            toast: '',
            toastTimer: null,
            draftInquiry: { photographer: '', city: '', service: '', budget: '', note: '' },
            savedItems: {},
            likedItems: {},
            followedAuthors: {},
            mockData: {{MOCK_DATA}},
            go(target) {
                this.hash = target;
                window.location.hash = target;
            },
            showToast(message) {
                this.toast = message;
                if (this.toastTimer) clearTimeout(this.toastTimer);
                this.toastTimer = setTimeout(() => { this.toast = ''; }, 2200);
            },
            openComposer(kind = 'post', target = null) {
                this.postDraftKind = kind;
                this.postTarget = target || this.hash || '#pg1';
                this.postOpen = true;
                this.composerDraft = { title: '', body: '' };
                const openMap = {
                    generic: '已打开新建面板',
                    service: '已打开服务面板',
                    portfolio: '已打开作品面板',
                    lead: '已打开新建线索面板',
                    appointment: '已打开预约面板',
                    schedule: '已打开排课面板',
                    vehicle: '已打开车源面板',
                    property: '已打开房源面板',
                    ticket: '已打开场次面板',
                    course: '已打开课程面板',
                    product: '已打开商品面板',
                    workorder: '已打开工单面板',
                    comment: '已打开评论面板',
                    post: '已打开发布面板'
                };
                this.showToast(openMap[kind] || '已打开发布面板');
            },
            submitPost() {
                const title = String(this.composerDraft?.title || '').trim();
                const body = String(this.composerDraft?.body || '').trim();
                if (this.postDraftKind === 'post' && !title) {
                    this.showToast('请先填写标题');
                    return;
                }
                if (this.postDraftKind === 'post') {
                    this.insertPublishedPost({
                        title: title || '新的穿搭笔记',
                        description: body || '刚刚发布了一条新的穿搭内容。',
                        content: body || '刚刚发布了一条新的穿搭内容。',
                        category: this.pagePostDraft?.scene || '今日穿搭',
                        tags: this.parseDraftTags(this.pagePostDraft?.tags || '今日穿搭,灵感记录')
                    });
                }
                this.postOpen = false;
                const messageMap = {
                    post: '内容已发布',
                    comment: '评论已发布',
                    generic: '草稿已保存',
                    service: '服务草稿已保存',
                    portfolio: '作品草稿已保存',
                    lead: '新线索已加入草稿',
                    appointment: '预约草稿已保存',
                    schedule: '排课草稿已保存',
                    vehicle: '车源草稿已保存',
                    property: '房源草稿已保存',
                    ticket: '场次草稿已保存',
                    course: '课程草稿已保存',
                    product: '商品草稿已保存',
                    workorder: '工单草稿已保存'
                };
                this.composerDraft = { title: '', body: '' };
                this.showToast(messageMap[this.postDraftKind] || '内容已发布');
                if (this.postTarget) this.go(this.postTarget);
            },
            itemId(item) {
                return String(item?.id || item?.title || item?.name || item?.author || Date.now());
            },
            authorKey(item) {
                if (typeof item === 'string') return item;
                return String(item?.author || item?.creator || item?.username || '');
            },
            formatMetric(value) {
                const numeric = Math.max(0, Math.round(Number(value) || 0));
                if (numeric >= 10000) {
                    const wan = (numeric / 10000).toFixed(numeric >= 100000 ? 0 : 1).replace(/\.0$/, '');
                    return `${wan}w`;
                }
                if (numeric >= 1000) {
                    const kilo = (numeric / 1000).toFixed(1).replace(/\.0$/, '');
                    return `${kilo}k`;
                }
                return String(numeric);
            },
            mutateMetric(item, fields, delta = 1) {
                if (!item) return;
                for (const field of fields) {
                    if (item[field] != null) {
                        const current = this.parseMetric(item[field]);
                        item[field] = this.formatMetric(current + delta);
                    }
                }
            },
            isSaved(item) {
                return !!this.savedItems[this.itemId(item)];
            },
            isLiked(item) {
                return !!this.likedItems[this.itemId(item)];
            },
            isFollowed(item) {
                const key = this.authorKey(item);
                return !!this.followedAuthors[key];
            },
            toggleSave(item = null) {
                const target = item || this.selectedItem;
                if (!target) return;
                const id = this.itemId(target);
                const next = !this.savedItems[id];
                this.savedItems = { ...this.savedItems, [id]: next };
                this.mutateMetric(target, ['collects', 'saves'], next ? 1 : -1);
                this.showToast(next ? '已加入收藏' : '已取消收藏');
            },
            toggleLike(item = null) {
                const target = item || this.selectedItem;
                if (!target) return;
                const id = this.itemId(target);
                const next = !this.likedItems[id];
                this.likedItems = { ...this.likedItems, [id]: next };
                this.mutateMetric(target, ['likes', 'likeCount'], next ? 1 : -1);
                this.showToast(next ? '已点赞' : '已取消点赞');
            },
            toggleFollow(item = null) {
                const target = item || this.selectedItem;
                const key = this.authorKey(target);
                if (!key) return;
                const next = !this.followedAuthors[key];
                this.followedAuthors = { ...this.followedAuthors, [key]: next };
                this.showToast(next ? `已关注 ${key}` : `已取消关注 ${key}`);
            },
            openDetail(item) {
                this.detailReturnHash = this.hash && this.hash !== '#detail' ? this.hash : (this.detailReturnHash || '#pg1');
                this.selectedItem = item;
                const author = item?.author || item?.creator || 'LingNow';
                this.detailComments = [
                    { id: 'c1', author: author, content: '这套的比例好稳，短外套真的很加分。', replies: 2 },
                    { id: 'c2', author: '穿搭灵感收藏夹', content: '想问一下裤子的版型和鞋子链接。', replies: 1 }
                ];
                this.draftComment = '';
                this.replyTarget = '';
                this.go('#detail');
            },
            closeDetail(fallback = null) {
                this.selectedItem = null;
                this.detailComments = [];
                this.draftComment = '';
                this.replyTarget = '';
                const target = fallback || (this.detailReturnHash && this.detailReturnHash !== '#detail' ? this.detailReturnHash : '#pg1');
                this.go(target);
            },
            startReply(comment) {
                this.replyTarget = comment?.author || '';
                this.draftComment = this.replyTarget ? `回复 ${this.replyTarget}：` : '';
            },
            submitComment() {
                if (!this.selectedItem) return;
                const content = String(this.draftComment || '').trim();
                if (!content) {
                    this.showToast('请输入评论内容');
                    return;
                }
                this.detailComments.unshift({
                    id: 'c' + Date.now(),
                    author: this.viewer?.name || 'LingNow 用户',
                    content,
                    replies: 0
                });
                const current = Number(this.selectedItem.comments || this.selectedItem.commentCount || 0);
                this.selectedItem.comments = String(current + 1);
                this.selectedItem.commentCount = String(current + 1);
                this.draftComment = '';
                this.replyTarget = '';
                this.showToast('评论已发布');
            },
            parseDraftTags(value) {
                return String(value || '')
                    .split(/[，,、\s]+/)
                    .map(tag => tag.trim())
                    .filter(Boolean)
                    .slice(0, 4);
            },
            insertPublishedPost(payload = {}) {
                const viewerName = this.viewer?.name || 'LingNow 用户';
                const viewerAvatar = this.viewer?.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(viewerName)}&background=fef08a&color=111827`;
                const tags = Array.isArray(payload.tags) && payload.tags.length ? payload.tags : ['今日穿搭'];
                const item = {
                    id: 'post-' + Date.now(),
                    title: payload.title || '新的穿搭笔记',
                    description: payload.description || payload.content || '刚刚发布了一条新的穿搭内容。',
                    content: payload.content || payload.description || '刚刚发布了一条新的穿搭内容。',
                    author: viewerName,
                    avatar: viewerAvatar,
                    authorAvatar: viewerAvatar,
                    location: '刚刚发布',
                    time: '刚刚',
                    category: payload.category || '今日穿搭',
                    mediaType: '图文',
                    likes: '0',
                    comments: '0',
                    collects: '0',
                    tags,
                    cover: 'https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1200'
                };
                const existing = Array.isArray(this.mockData) ? this.mockData : [];
                this.mockData = [item, ...existing];
            },
            savePageDraft() {
                this.showToast('草稿已保存');
            },
            publishPagePost() {
                const title = String(this.pagePostDraft?.title || '').trim();
                if (!title) {
                    this.showToast('请先填写标题');
                    return;
                }
                this.insertPublishedPost({
                    title,
                    description: this.pagePostDraft?.body || '刚刚发布了一条新的穿搭内容。',
                    content: this.pagePostDraft?.body || '刚刚发布了一条新的穿搭内容。',
                    category: this.pagePostDraft?.scene || '今日穿搭',
                    tags: this.parseDraftTags(this.pagePostDraft?.tags || '')
                });
                this.pagePostDraft = { title: '', body: '', tags: '', scene: '' };
                this.showToast('发布成功，已加入首页与个人主页');
                this.go('#pg1');
            },
            profileFeed(seedData) {
                const source = this.feedSource(seedData);
                if (!Array.isArray(source)) return [];
                return source.slice(0, 6);
            },
            startInquiry(item = null) {
                const source = item || this.selectedItem || {};
                this.draftInquiry = {
                    photographer: source.author || source.name || source.owner || '',
                    city: source.location || source.city || '',
                    service: source.category || source.style || source.type || '',
                    budget: '',
                    note: source.title || source.description || ''
                };
                this.selectedItem = null;
                this.inquirySubmitted = false;
                this.go('#pg4');
            },
            pickSlot(slot) {
                this.selectedSlot = slot;
                this.bookingConfirmed = false;
            },
            confirmBooking() {
                this.bookingConfirmed = true;
                this.showToast('档期已锁定，可继续提交询价');
                this.go('#pg4');
            },
            submitInquiry() {
                this.inquirySubmitted = true;
                this.showToast('询价已提交，订单已进入待确认');
                this.go('#pg5');
            },
            advanceOrder(order) {
                this.activeOrder = order;
                if (order) order.stage = '下一步跟进中';
                this.showToast('订单状态已推进');
            },
            normalizeText(value) {
                return String(value ?? '').toLowerCase().replace(/\s+/g, '');
            },
            parseMetric(value) {
                const raw = String(value ?? '').trim().toLowerCase();
                if (!raw) return 0;
                const normalized = raw.replace(/,/g, '').replace(/万/g, 'w');
                if (normalized.endsWith('w')) return (parseFloat(normalized) || 0) * 10000;
                if (normalized.endsWith('k')) return (parseFloat(normalized) || 0) * 1000;
                if (normalized.endsWith('m')) return (parseFloat(normalized) || 0) * 1000000;
                return parseFloat(normalized) || 0;
            },
            feedSource(seedData) {
                return Array.isArray(this.mockData) && this.mockData.length ? this.mockData : seedData;
            },
            itemTags(item) {
                return Array.isArray(item?.tags) ? item.tags : [];
            },
            matchesSearch(item) {
                if (!this.searchQuery) return true;
                const haystack = [
                    item?.title,
                    item?.name,
                    item?.description,
                    item?.summary,
                    item?.content,
                    item?.author,
                    item?.creator,
                    item?.location,
                    item?.topic,
                    item?.category,
                    ...this.itemTags(item)
                ].join(' ');
                return this.normalizeText(haystack).includes(this.normalizeText(this.searchQuery));
            },
            matchesCategory(item) {
                if (!this.activeCategory) return true;
                const categoryText = [
                    item?.category,
                    item?.topic,
                    item?.location,
                    ...this.itemTags(item)
                ].join(' ');
                return this.normalizeText(categoryText).includes(this.normalizeText(this.activeCategory));
            },
            matchesSignal(item) {
                if (this.activeSignal === 'saved') {
                    return this.parseMetric(item?.collects || item?.saves) >= 1200;
                }
                if (this.activeSignal === 'hot') {
                    return this.parseMetric(item?.comments || item?.commentCount) >= 500
                        || this.parseMetric(item?.likes || item?.likeCount) >= 10000;
                }
                if (this.activeSignal === 'media') {
                    const mediaText = [
                        item?.mediaType,
                        item?.contentType,
                        item?.noteType,
                        ...this.itemTags(item)
                    ].join(' ');
                    const normalized = this.normalizeText(mediaText);
                    return normalized.includes('视频') || normalized.includes('video');
                }
                return true;
            },
            sortFeed(items) {
                const cloned = [...items];
                if (this.activeSignal === 'saved') {
                    return cloned.sort((a, b) => this.parseMetric(b?.collects || b?.saves) - this.parseMetric(a?.collects || a?.saves));
                }
                if (this.activeSignal === 'hot') {
                    return cloned.sort((a, b) => {
                        const aScore = this.parseMetric(a?.comments || a?.commentCount) + this.parseMetric(a?.likes || a?.likeCount);
                        const bScore = this.parseMetric(b?.comments || b?.commentCount) + this.parseMetric(b?.likes || b?.likeCount);
                        return bScore - aScore;
                    });
                }
                return cloned;
            },
            getFilteredFeed(seedData) {
                const filtered = this.feedSource(seedData).filter(item => this.matchesSearch(item) && this.matchesCategory(item) && this.matchesSignal(item));
                return this.sortFeed(filtered);
            },
            submitAuth() {
                const username = String(this.authForm?.username ?? '').trim();
                this.viewer = {
                    name: username || 'LingNow 用户',
                    avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(username || 'LingNow')}&background=fef08a&color=111827`
                };
                const viewerName = this.viewer.name;
                this.followedAuthors = { ...this.followedAuthors, [viewerName]: true };
                this.authOpen = false;
                this.authMode = 'login';
                this.profileOpen = false;
                this.authForm = { username: '', password: '' };
                this.showToast('已登录，可继续发布和互动');
            },
            logout() {
                this.viewer = null;
                this.profileOpen = false;
                this.showToast('已退出登录');
            },
            handleLooseAction(label, target = null) {
                const normalized = String(label || '').toLowerCase();
                if (normalized.includes('查看详情') || normalized.includes('详情')) {
                    if (target === '#detail' && this.selectedItem) {
                        this.go('#detail');
                    } else if (target) {
                        this.go(target);
                    }
                    this.showToast(`${label} 已打开`);
                    return;
                }
                if (normalized.includes('清空') || normalized.includes('取消')) {
                    this.selectedItem = null;
                    this.selectedSlot = null;
                    this.selectedLead = null;
                    this.activeOrder = null;
                    this.showToast('已清空当前选择');
                    if (target) this.go(target);
                    return;
                }
                if (normalized.includes('发布') || normalized.includes('新建') || normalized.includes('添加') || normalized.includes('评论')) {
                    const kind = normalized.includes('评论') ? 'comment' : 'post';
                    this.openComposer(kind, target);
                    return;
                }
                if (normalized.includes('关注')) {
                    this.toggleFollow(this.selectedItem || label);
                    if (target && target !== '#detail') this.go(target);
                    return;
                }
                if (normalized.includes('收藏')) {
                    this.toggleSave(this.selectedItem);
                    return;
                }
                if (normalized.includes('点赞')) {
                    this.toggleLike(this.selectedItem);
                    return;
                }
                if (normalized.includes('分配') || normalized.includes('指派') || normalized.includes('负责人') || normalized.includes('派单')) {
                    this.activeOrder = { id: 'AUTO', title: label, stage: '已分配' };
                    this.showToast(`${label} 已执行`);
                    if (target) this.go(target);
                    return;
                }
                if (normalized.includes('推进') || normalized.includes('跟进') || normalized.includes('升级') || normalized.includes('确认') || normalized.includes('锁定')
                    || normalized.includes('预约') || normalized.includes('报名') || normalized.includes('支付') || normalized.includes('概率')
                    || normalized.includes('金额') || normalized.includes('记录')) {
                    this.activeOrder = { id: 'AUTO', title: label, stage: '已更新' };
                    this.showToast(`${label} 已记录`);
                    if (target && target !== '#detail') this.go(target);
                    return;
                }
                if (target) this.go(target);
                this.showToast(`${label} 已触发`);
            }
         }">

    <div class="fixed left-4 top-20 z-[70] rounded-full bg-slate-950 px-4 py-2.5 text-sm font-bold text-white shadow-2xl shadow-slate-300/60"
         x-cloak
         x-show="toast"
         x-text="toast"
         x-transition.opacity.duration.180ms></div>

    <header class="sticky top-0 z-40 w-full border-b border-slate-200 bg-white/85 backdrop-blur-md">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4">
            <div class="flex items-center gap-4">
                <button @click="drawerOpen = !drawerOpen" class="md:hidden p-2 hover:bg-slate-100 rounded-lg">
                    <i class="fa-solid fa-bars"></i>
                </button>
                {{LOGO_AREA}}
            </div>

            <div class="hidden flex-1 max-w-xl mx-8 md:block">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input class="shell-search-focus w-full h-11 pl-10 pr-4 rounded-full bg-slate-100 border-transparent focus:bg-white transition-all text-sm"
                           x-model.debounce.250ms="searchQuery"
                           placeholder="{{SEARCH_PLACEHOLDER}}"
                           type="text">
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button @click="{{PUBLISH_ACTION}}"
                        class="shell-primary-button flex items-center gap-2 rounded-full px-4 py-2 text-sm font-bold transition"
                        data-lingnow-action="shell-open-composer">
                    <i class="fa-solid fa-plus"></i>
                    <span>{{PUBLISH_LABEL}}</span>
                </button>
                <div class="flex items-center gap-1 border-l border-slate-200 ml-2 pl-2">
                    {{UTILITY_BUTTONS}}
                    <template x-if="!viewer">
                        <div class="ml-2 flex items-center">
                            <button
                                    @click="authMode = 'login'; authOpen = true"
                                    class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50">
                                登录
                            </button>
                        </div>
                    </template>
                    <template x-if="viewer">
                        <div class="relative ml-2">
                            <button @click="profileOpen = !profileOpen" class="rounded-full">
                                <img :src="viewer.avatar"
                                     class="h-8 w-8 rounded-full border border-slate-200 cursor-pointer">
                            </button>
                            <div
                                    @click.outside="profileOpen = false"
                                    class="absolute right-0 top-full mt-2 w-44 bg-white border border-slate-100 shadow-xl rounded-xl"
                                    x-cloak
                                    x-show="profileOpen">
                                <div class="border-b border-slate-100 px-4 py-3">
                                    <div class="text-sm font-semibold text-slate-900" x-text="viewer.name"></div>
                                    <div class="text-xs text-slate-500">已登录</div>
                                </div>
                                {{PERSONAL_LINKS}}
                                <button @click="logout()"
                                        class="flex w-full items-center gap-3 px-4 py-3 text-left text-sm text-slate-600 hover:bg-slate-50">
                                    <i class="fa-solid fa-right-from-bracket"></i>
                                    退出登录
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div class="border-t border-slate-100 bg-white/90">
            <div class="mx-auto flex max-w-7xl items-center gap-3 overflow-x-auto px-4 py-3">
                {{SIDEBAR_NAV}}
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-6">
        {{CONTENT_SLOTS}}
    </main>

    <template x-if="selectedItem">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4" x-cloak>
            <div @click="closeDetail()" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
            <div class="relative w-full max-w-4xl max-h-[90vh] overflow-y-auto bg-white rounded-3xl shadow-2xl animate-in zoom-in-95 duration-200">
                {{MODAL_SLOT}}
            </div>
        </div>
    </template>

    <template x-if="postOpen">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4" x-cloak>
            <div @click="postOpen = false" class="absolute inset-0 bg-slate-900/40"></div>
            <div class="relative w-full max-w-lg bg-white rounded-2xl p-6 shadow-2xl">
                <h3 class="text-lg font-bold mb-4">{{POST_TITLE}}</h3>
                <input class="shell-field-focus mb-3 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-3 text-sm"
                       placeholder="输入标题"
                       x-model="composerDraft.title">
                <textarea class="shell-field-focus w-full h-32 p-3 bg-slate-50 border border-slate-200 rounded-xl mb-4"
                          x-model="composerDraft.body"
                          placeholder="{{POST_PLACEHOLDER}}"></textarea>
                <div class="flex gap-2">
                    <button @click="postOpen = false" class="flex-1 py-2 rounded-xl bg-slate-100 font-bold">取消
                    </button>
                    <button @click="submitPost()" class="shell-submit-button flex-1 py-2 rounded-xl font-bold transition"
                            data-lingnow-action="shell-submit-composer">
                        {{POST_SUBMIT_LABEL}}
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="authOpen">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4" x-cloak>
            <div @click="authOpen = false" class="absolute inset-0 bg-slate-900/40"></div>
            <div class="relative w-full max-w-md rounded-[28px] bg-white p-6 shadow-2xl">
                <div class="mb-5 flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-black text-slate-900"
                            x-text="authMode === 'login' ? '欢迎回来' : '创建账号'"></h3>
                        <p class="mt-1 text-sm text-slate-500"
                           x-text="authMode === 'login' ? '登录后继续收藏、评论和发布。' : '注册后即可保存你的兴趣、发布内容和参与互动。'"></p>
                    </div>
                    <button @click="authOpen = false" class="text-2xl leading-none text-slate-300 hover:text-slate-500">
                        &times;
                    </button>
                </div>
                <div class="mb-4 flex rounded-full bg-slate-100 p-1 text-sm font-semibold">
                    <button
                            :class="authMode === 'login' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'"
                            @click="authMode = 'login'"
                            class="flex-1 rounded-full px-4 py-2 transition">
                        登录
                    </button>
                    <button
                            :class="authMode === 'register' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'"
                            @click="authMode = 'register'"
                            class="flex-1 rounded-full px-4 py-2 transition">
                        注册
                    </button>
                </div>
                <div class="space-y-3">
                    <input
                            class="shell-field-focus w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none"
                            placeholder="用户名 / 手机号"
                            type="text"
                            x-model="authForm.username">
                    <input
                            class="shell-field-focus w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none"
                            placeholder="密码"
                            type="password"
                            x-model="authForm.password">
                    <button
                            @click="submitAuth()"
                            class="shell-submit-button w-full rounded-2xl px-4 py-3 text-sm font-bold transition"
                            x-text="authMode === 'login' ? '登录进入' : '注册并进入'"></button>
                </div>
            </div>
        </div>
    </template>
</div>
</body>
</html>
