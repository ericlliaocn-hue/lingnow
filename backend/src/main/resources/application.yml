# Sa-Token 配置
sa-token: 
    # token 名称 (同时也是 cookie 名称)
    token-name: satoken
    # token 有效期，单位秒 默认30天 (-1 代表永久有效)
    timeout: 2592000
    # token 临时有效期 (指定时间内无操作就视为 token 过期) 单位秒
    active-timeout: -1
    # 是否允许同一账号多地同时登录 (为 true 时允许一起登录, 为 false 时新登录挤掉旧登录)
    is-concurrent: true
    # 在多人登录同一账号时，是否共用一个 token (为 true 时共用, 为 false 时每次登录新建一个 token)
    is-share: false
    # token 风格
    token-style: uuid
    # 是否输出操作日志 
    is-log: false

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    cc.lingnow: DEBUG
    org.springframework.web.cors: DEBUG

# LingNow.cc LLM 配置（metapi 中转，OpenAI 兼容接口）
